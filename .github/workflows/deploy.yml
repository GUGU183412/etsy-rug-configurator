name: Deploy Pages Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Build editor
        run: cd packages/editor && npm run build -- --base /etsy-rug-configurator/

      - name: Build merchant tool
        run: cd packages/merchant-tool && npm run build -- --base /etsy-rug-configurator/merchant/

      - name: Assemble Pages artifact
        run: |
          mkdir -p pages-site/merchant
          cp -r packages/editor/dist/. pages-site/
          cp -r packages/merchant-tool/dist/. pages-site/merchant/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
